<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam2Avatar</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.25rem; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
        #camera-section {
            position: relative;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            aspect-ratio: 4/3;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        #snapshot-canvas { display: none; }
        #controls { margin-top: 1.5rem; display: flex; gap: 1rem; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #capture-btn { background: #6c5ce7; color: white; }
        #capture-btn:hover:not(:disabled) { background: #5a4bd1; transform: scale(1.03); }
        #retry-btn { background: #2d3436; color: #dfe6e9; }
        #retry-btn:hover { background: #3d4446; }
        #status {
            margin-top: 1.25rem;
            padding: 0.6rem 1.2rem;
            background: #161625;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #a0a0c0;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #status.error { color: #e74c3c; background: #1a0a0a; }
        #status.success { color: #2ecc71; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #444;
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #results {
            display: none;
            width: 100%;
            max-width: 720px;
            margin-top: 2rem;
        }
        #features-panel {
            background: #161625;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        #features-panel h3 { margin-bottom: 0.75rem; font-size: 1rem; color: #b0b0d0; }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }
        .feature-item {
            background: #1e1e35;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .feature-item .label { color: #777; font-size: 0.75rem; display: block; }
        .feature-item .value { color: #e0e0e0; font-weight: 500; }
        .color-dot {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            border: 1px solid #444;
        }
        #avatars-panel h3 {
            font-size: 1rem;
            color: #b0b0d0;
            margin-bottom: 1rem;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .avatar-card {
            background: #161625;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .avatar-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
        .avatar-card.selected { border-color: #6c5ce7; background: #1e1e35; }
        .avatar-card svg { width: 100%; height: auto; border-radius: 8px; }
        .avatar-card .style-name {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #888;
        }
        .avatar-card .dl-btn {
            margin-top: 0.5rem;
            padding: 0.35rem 0.7rem;
            font-size: 0.75rem;
            background: #6c5ce7;
            color: white;
            border-radius: 6px;
            display: none;
        }
        .avatar-card.selected .dl-btn { display: inline-block; }
        .avatar-card .dl-btn:hover { background: #5a4bd1; }
        #photo-preview {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        #photo-preview img {
            max-width: 200px;
            border-radius: 12px;
            transform: scaleX(-1);
            border: 2px solid #2d2d4a;
        }
        @media (max-width: 600px) {
            .avatar-grid { grid-template-columns: 1fr 1fr; }
            .features-grid { grid-template-columns: 1fr 1fr; }
            body { padding: 1rem 0.75rem; }
        }
    </style>
</head>
<body>
    <h1>Webcam2Avatar</h1>
    <p class="subtitle">Foto machen &rarr; Gesicht analysieren &rarr; Avatar generieren</p>

    <div id="camera-section">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="snapshot-canvas"></canvas>

    <div id="controls">
        <button id="capture-btn" disabled>Foto aufnehmen</button>
        <button id="retry-btn" style="display:none">Neues Foto</button>
    </div>

    <div id="status"><div class="spinner"></div><span>Initialisiere...</span></div>

    <div id="results">
        <div id="photo-preview"></div>
        <div id="features-panel">
            <h3>Erkannte Merkmale</h3>
            <div id="features-list" class="features-grid"></div>
        </div>
        <div id="avatars-panel">
            <h3>Deine Avatar-Vorschl&auml;ge</h3>
            <div id="avatar-grid" class="avatar-grid"></div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => { init(); });

    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    let videoStream = null;

    /* ── Init ── */
    async function init() {
        try {
            setStatus('Lade Gesichtserkennungs-Modelle... (1/4)', true);
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (2/4)', true);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (3/4)', true);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (4/4)', true);
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            setStatus('Starte Kamera...', true);
            await startCamera();
            setStatus('Bereit! Klicke auf "Foto aufnehmen".', false, 'success');
            document.getElementById('capture-btn').disabled = false;
        } catch (e) {
            setStatus('Fehler: ' + e.message, false, 'error');
        }
    }

    /* ── Camera ── */
    async function startCamera() {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        const video = document.getElementById('video');
        video.srcObject = videoStream;
        video.style.display = 'block';
        await new Promise(r => { video.onloadeddata = r; });
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
    }

    /* ── Capture & Analyze ── */
    async function capture() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('snapshot-canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        stopCamera();
        video.style.display = 'none';
        document.getElementById('capture-btn').style.display = 'none';
        document.getElementById('retry-btn').style.display = 'inline-block';

        setStatus('Foto aufgenommen! Starte Gesichtsanalyse...', true);

        const detection = await faceapi
            .detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }))
            .withFaceLandmarks()
            .withFaceExpressions()
            .withAgeAndGender();

        if (!detection) {
            setStatus('Kein Gesicht erkannt. Bitte versuche es erneut.', false, 'error');
            return;
        }

        setStatus('Gesicht erkannt! Analysiere Merkmale (Hautton, Haare, Brille, Schnurrbart)...', true);
        const features = extractFeatures(detection, ctx);
        const avatars = [
            { name: 'Cartoon', svg: generateCartoonAvatar(features) },
            { name: 'Artistic', svg: generateArtisticAvatar(features) },
            { name: 'Minimal', svg: generateMinimalAvatar(features) },
            { name: 'Geo', svg: generateGeoAvatar(features) },
        ];
        setStatus('Generiere Avatar-Vorschl\u00e4ge...', true);
        // Short delay so user sees the status update
        await new Promise(r => setTimeout(r, 100));
        showResults(canvas.toDataURL('image/jpeg', 0.85), features, avatars);
        setStatus('Fertig! W\u00e4hle deinen Lieblings-Avatar.', false, 'success');
    }

    async function retry() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('video').style.display = 'block';
        document.getElementById('capture-btn').style.display = 'inline-block';
        document.getElementById('capture-btn').disabled = true;
        document.getElementById('retry-btn').style.display = 'none';
        setStatus('Starte Kamera...', true);
        await startCamera();
        setStatus('Bereit!', false, 'success');
        document.getElementById('capture-btn').disabled = false;
    }

    /* ── Pixel Sampling Helpers ── */
    function sampleGrid(ctx, cx, cy, radius) {
        const colors = [];
        const w = ctx.canvas.width, h = ctx.canvas.height;
        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                const x = Math.max(0, Math.min(Math.round(cx + dx), w - 1));
                const y = Math.max(0, Math.min(Math.round(cy + dy), h - 1));
                const d = ctx.getImageData(x, y, 1, 1).data;
                colors.push({ r: d[0], g: d[1], b: d[2] });
            }
        }
        return colors;
    }

    function avgOfColors(colors) {
        if (!colors.length) return { r: 180, g: 150, b: 130 };
        let r = 0, g = 0, b = 0;
        for (const c of colors) { r += c.r; g += c.g; b += c.b; }
        const n = colors.length;
        return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) };
    }

    function medianColor(colors) {
        if (!colors.length) return { r: 180, g: 150, b: 130 };
        colors.sort((a, b) => (a.r + a.g + a.b) - (b.r + b.g + b.b));
        return colors[Math.floor(colors.length / 2)];
    }

    function brightnessOf(c) { return (c.r + c.g + c.b) / 3; }

    function avgBrightnessOfPts(ctx, pts) {
        if (!pts.length) return 128;
        let total = 0;
        const w = ctx.canvas.width, h = ctx.canvas.height;
        for (const p of pts) {
            const x = Math.max(0, Math.min(Math.round(p.x), w - 1));
            const y = Math.max(0, Math.min(Math.round(p.y), h - 1));
            const d = ctx.getImageData(x, y, 1, 1).data;
            total += (d[0] + d[1] + d[2]) / 3;
        }
        return total / pts.length;
    }

    function avgColorOfPts(ctx, pts) {
        if (!pts.length) return { r: 60, g: 60, b: 60 };
        let r = 0, g = 0, b = 0;
        const w = ctx.canvas.width, h = ctx.canvas.height;
        for (const p of pts) {
            const x = Math.max(0, Math.min(Math.round(p.x), w - 1));
            const y = Math.max(0, Math.min(Math.round(p.y), h - 1));
            const d = ctx.getImageData(x, y, 1, 1).data;
            r += d[0]; g += d[1]; b += d[2];
        }
        const n = pts.length;
        return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) };
    }

    function clampBrightness(c, lo, hi) {
        const br = brightnessOf(c);
        if (br < lo) { const f = lo / Math.max(br, 1); return mapC(c, f); }
        if (br > hi) { const f = hi / br; return mapC(c, f); }
        return c;
    }
    function mapC(c, f) {
        return { r: Math.min(255, Math.round(c.r * f)), g: Math.min(255, Math.round(c.g * f)), b: Math.min(255, Math.round(c.b * f)) };
    }

    /* ── Color Helpers ── */
    function rgbHex(c) { return '#' + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, '0')).join(''); }
    function brighten(hex, f) {
        const c = hexRgb(hex);
        return rgbHex({ r: Math.min(255, Math.round(c.r * f)), g: Math.min(255, Math.round(c.g * f)), b: Math.min(255, Math.round(c.b * f)) });
    }
    function hexRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
    function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h; }

    const BG_COLORS = ['#dfe6e9','#dff9fb','#ffeaa7','#fab1a0','#a29bfe','#55efc4','#74b9ff','#fd79a8','#f5f6fa'];
    const CLOTH_COLORS = ['#3498db','#2ecc71','#e74c3c','#9b59b6','#f39c12','#1abc9c','#34495e','#e67e22'];

    function pickBg(seed) { return BG_COLORS[Math.abs(hashStr(seed)) % BG_COLORS.length]; }
    function pickCloth(seed) { return CLOTH_COLORS[Math.abs(hashStr(seed)) % CLOTH_COLORS.length]; }

    /* ── Feature Extraction (refined) ── */
    function extractFeatures(det, ctx) {
        const lm = det.landmarks;
        const age = Math.round(det.age);
        const gender = det.gender;
        const genderProb = det.genderProbability;

        const exprs = det.expressions;
        const sortedExprs = Object.entries(exprs).sort((a, b) => b[1] - a[1]);
        const expression = sortedExprs[0][0];
        const expressionScore = sortedExprs[0][1];

        const jaw = lm.getJawOutline();
        const nose = lm.getNose();
        const mouth = lm.getMouth();
        const leftBrow = lm.getLeftEyeBrow();
        const rightBrow = lm.getRightEyeBrow();
        const leftEye = lm.getLeftEye();
        const rightEye = lm.getRightEye();

        // ── Skin color: sample from well-lit face areas ──
        const skinSamples = [];
        const foreheadX = (leftBrow[2].x + rightBrow[2].x) / 2;
        const foreheadY = (leftBrow[2].y + rightBrow[2].y) / 2;
        skinSamples.push(...sampleGrid(ctx, foreheadX, foreheadY, 3));
        skinSamples.push(...sampleGrid(ctx, nose[0].x - 8, nose[0].y, 2));
        skinSamples.push(...sampleGrid(ctx, nose[0].x + 8, nose[0].y, 2));

        for (const eyeSet of [leftEye, rightEye]) {
            const cx = (eyeSet[0].x + eyeSet[3].x) / 2;
            const cheekX = cx + (nose[0].x - cx) * 0.4;
            const cheekY = eyeSet[4].y + 10;
            skinSamples.push(...sampleGrid(ctx, cheekX, cheekY, 3));
        }

        let skinColor = medianColor(skinSamples);
        skinColor = mapC(skinColor, 1.15);
        skinColor = clampBrightness(skinColor, 95, 245);
        const skinBr = brightnessOf(skinColor);

        // ── Hair color ──
        const allHairSamples = [];
        const brows = [...leftBrow, ...rightBrow];
        const faceH = jaw[8].y - Math.min(...brows.map(p => p.y));
        const hairOffset = Math.max(35, faceH * 0.65);

        for (const offsetMul of [0.8, 1.0, 1.2]) {
            const off = hairOffset * offsetMul;
            for (const p of brows) {
                const y = p.y - off;
                if (y > 2) allHairSamples.push(...sampleGrid(ctx, p.x, y, 2));
            }
        }

        let hairColor = allHairSamples.length > 0 ? medianColor(allHairSamples) : { r: 60, g: 40, b: 30 };
        if (Math.abs(hairColor.r - skinColor.r) + Math.abs(hairColor.g - skinColor.g) + Math.abs(hairColor.b - skinColor.b) < 50) {
            hairColor = mapC(hairColor, 0.55);
        }
        hairColor = clampBrightness(hairColor, 15, 210);

        // ── Refined Expression ──
        let refinedExpression = 'Normal';
        if (expression === 'happy') {
            refinedExpression = expressionScore > 0.85 ? '\u00dcbergl\u00fccklich' : 'Normal lachend';
        } else if (expression === 'sad') {
            refinedExpression = expressionScore > 0.7 ? 'Voll traurig' : 'Traurig';
        } else if (expression === 'neutral') {
            refinedExpression = 'Neutral';
        } else {
            const m = { angry: 'W\u00fctend', fearful: '\u00c4ngstlich', disgusted: 'Angewidert', surprised: '\u00dcberrascht' };
            refinedExpression = m[expression] || expression;
        }

        // ── Mustache Detection ──
        const mustacheZone = [];
        const noseBottom = nose[6];
        const mouthTop = mouth[3];
        for (let t = 0.2; t <= 0.8; t += 0.3) {
            mustacheZone.push(...sampleGrid(ctx, noseBottom.x, noseBottom.y + (mouthTop.y - noseBottom.y) * t, 2));
        }
        const mustacheBr = avgBrightnessOfPts(ctx, mustacheZone);
        const hasMustache = (mustacheBr < skinBr * 0.78);

        // ── Teeth Detection ──
        let showsTeeth = false;
        if (expression === 'happy') {
            const innerMouthPts = [];
            const mCenter = { x: (mouth[12].x + mouth[16].x) / 2, y: (mouth[12].y + mouth[16].y) / 2 };
            innerMouthPts.push(...sampleGrid(ctx, mCenter.x, mCenter.y, 2));
            showsTeeth = avgBrightnessOfPts(ctx, innerMouthPts) > skinBr * 0.8 || avgBrightnessOfPts(ctx, innerMouthPts) > 160;
        }

        // ── Nose Shape ──
        const noseWidth = Math.abs(nose[4].x - nose[0].x);
        const noseHeight = Math.abs(nose[3].y - nose[0].y);
        const noseShape = (noseWidth / (noseHeight || 1)) > 1.3 ? 'breit' : 'schmal/kurz';

        // ── Earring Detection ──
        const earringPts = [];
        earringPts.push(...sampleGrid(ctx, jaw[0].x - 5, jaw[0].y + 5, 2));
        earringPts.push(...sampleGrid(ctx, jaw[16].x + 5, jaw[16].y + 5, 2));
        const hasEarrings = Math.abs(avgBrightnessOfPts(ctx, earringPts) - skinBr) > 40;

        // ── Glasses detection ──
        const glasses = detectGlasses(ctx, lm, skinBr);

        return {
            age, gender, genderProb, expression, refinedExpression,
            skinColor, hairColor,
            skinHex: rgbHex(skinColor),
            hairHex: rgbHex(hairColor),
            glasses, hasMustache, showsTeeth, noseShape, hasEarrings
        };
    }

    /* ── Glasses Detection ── */
    function detectGlasses(ctx, landmarks, skinBr) {
        const le = landmarks.getLeftEye(), re = landmarks.getRightEye();
        const lb = landmarks.getLeftEyeBrow(), rb = landmarks.getRightEyeBrow();
        function box(pts) {
            let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
            for (const p of pts) { x1 = Math.min(x1, p.x); y1 = Math.min(y1, p.y); x2 = Math.max(x2, p.x); y2 = Math.max(y2, p.y); }
            return { x1, y1, x2, y2, cx: (x1+x2)/2, cy: (y1+y2)/2, w: x2-x1, h: y2-y1 };
        }
        const lBox = box(le), rBox = box(re), lbBox = box(lb), rbBox = box(rb);
        const topPts = [];
        for (const [eB, bB] of [[lBox, lbBox], [rBox, rbBox]]) {
            const y = (bB.y2 + eB.y1) / 2;
            for (let x = eB.x1 - 4; x <= eB.x2 + 4; x += 2) topPts.push({ x, y }, { x, y: y + 2 });
        }
        const bridgePts = [];
        const lInner = le[3], rInner = re[0];
        for (let t = 0.1; t <= 0.9; t += 0.1) bridgePts.push({ x: lInner.x + (rInner.x - lInner.x) * t, y: lInner.y + (rInner.y - lInner.y) * t - 2 });
        
        const topRatio = avgBrightnessOfPts(ctx, topPts) / Math.max(skinBr, 1);
        const bridgeRatio = avgBrightnessOfPts(ctx, bridgePts) / Math.max(skinBr, 1);
        const hasGlasses = (topRatio < 0.72 || bridgeRatio < 0.72);

        if (!hasGlasses) return { hasGlasses: false, shape: null, colorHex: null };

        const glassW = (lBox.w + rBox.w) / 2 + 10, glassH = (lBox.h + rBox.h) / 2 + 10;
        const ar = glassW / Math.max(glassH, 1);
        const shape = ar > 1.6 ? 'eckig' : ar < 1.2 ? 'rund' : 'oval';
        const frameColor = avgColorOfPts(ctx, bridgePts);
        return { hasGlasses: true, shape, color: frameColor, colorHex: rgbHex(frameColor) };
    }

    /* ── Glasses SVG Renderer ── */
    function renderGlasses(f, lx, rx, ey, style) {
        if (!f.glasses || !f.glasses.hasGlasses) return '';
        const gc = f.glasses.colorHex || '#333';
        const shape = f.glasses.shape || 'oval';
        const sw = 2.2, midX = (lx + rx) / 2;
        let s = '';
        const tint = `fill="${gc}" fill-opacity="0.08"`;
        if (shape === 'rund') {
            s += `<circle cx="${lx}" cy="${ey}" r="13" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<circle cx="${rx}" cy="${ey}" r="13" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        } else if (shape === 'eckig') {
            s += `<rect x="${lx-14}" y="${ey-9}" width="28" height="18" rx="2" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<rect x="${rx-14}" y="${ey-9}" width="28" height="18" rx="2" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        } else {
            s += `<ellipse cx="${lx}" cy="${ey}" rx="15" ry="11" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<ellipse cx="${rx}" cy="${ey}" rx="15" ry="11" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        }
        s += `<path d="M${lx+13} ${ey-1} Q${midX} ${ey-4} ${rx-13} ${ey-1}" stroke="${gc}" stroke-width="${sw*0.8}" fill="none"/>`;
        return s;
    }

    /* ── Avatar: Cartoon ── */
    function generateCartoonAvatar(f) {
        const sk = f.skinHex, skD = brighten(sk, 0.82), hr = f.hairHex, hrD = brighten(hr, 0.7);
        const bg = pickBg(sk + 'cartoon'), cl = pickCloth(hr + sk + 'cartoon');
        const fem = f.gender === 'female' && f.genderProb > 0.55;
        let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">`;
        s += `<rect width="200" height="200" rx="16" fill="${bg}"/>`;
        if (fem) { s += `<ellipse cx="100" cy="88" rx="63" ry="68" fill="${hr}"/><rect x="39" y="88" width="20" height="55" rx="10" fill="${hr}"/><rect x="141" y="88" width="20" height="55" rx="10" fill="${hr}"/>`; }
        s += `<rect x="88" y="142" width="24" height="22" rx="5" fill="${sk}"/>`;
        s += `<ellipse cx="100" cy="188" rx="52" ry="30" fill="${cl}"/>`;
        s += `<ellipse cx="44" cy="98" rx="8" ry="12" fill="${sk}"/>`;
        s += `<ellipse cx="156" cy="98" rx="8" ry="12" fill="${sk}"/>`;
        if (f.hasEarrings) { s += `<circle cx="44" cy="108" r="3" fill="#ffd700"/><circle cx="156" cy="108" r="3" fill="#ffd700"/>`; }
        s += `<ellipse cx="100" cy="95" rx="55" ry="60" fill="${sk}"/>`;
        s += `<path d="M50 88 Q50 38 100 30 Q150 38 150 88 Q146 54 100 45 Q54 54 50 88Z" fill="${hr}"/>`;
        const ba = f.expression==='angry'?5 : f.expression==='sad'?-3 : 0;
        s += `<line x1="68" y1="${78-ba}" x2="88" y2="${78+ba}" stroke="${hrD}" stroke-width="2.5" stroke-linecap="round"/>`;
        s += `<line x1="112" y1="${78+ba}" x2="132" y2="${78-ba}" stroke="${hrD}" stroke-width="2.5" stroke-linecap="round"/>`;
        const ey = 90;
        s += `<ellipse cx="79" cy="${ey}" rx="6" ry="5.5" fill="white" stroke="#333" stroke-width="1"/><circle cx="80" cy="${ey}" r="3" fill="#333"/>`;
        s += `<ellipse cx="121" cy="${ey}" rx="6" ry="5.5" fill="white" stroke="#333" stroke-width="1"/><circle cx="120" cy="${ey}" r="3" fill="#333"/>`;
        s += renderGlasses(f, 79, 121, ey, 'cartoon');
        const nw = f.noseShape === 'breit' ? 8 : 4;
        s += `<path d="M${100-nw} 103 Q100 110 ${100+nw} 103" stroke="${skD}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;
        if (f.hasMustache) s += `<path d="M85 112 Q100 108 115 112 Q110 118 100 118 Q90 118 85 112" fill="${hrD}"/>`;
        const my = 120;
        if (f.expression === 'happy') {
            if (f.showsTeeth) s += `<path d="M82 ${my} Q100 ${my+15} 118 ${my} Z" fill="white" stroke="#c0392b" stroke-width="1.5"/>`;
            else s += `<path d="M82 ${my} Q100 ${my+12} 118 ${my}" stroke="#c0392b" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
        } else if (f.expression === 'sad') s += `<path d="M85 ${my+5} Q100 ${my-2} 115 ${my+5}" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        else s += `<path d="M85 ${my} Q100 ${my+4} 115 ${my}" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        s += `</svg>`;
        return s;
    }

    /* ── Avatar: Artistic ── */
    function generateArtisticAvatar(f) {
        const sk = f.skinHex, hr = f.hairHex, hrD = brighten(hr, 0.6);
        const bg = '#1a1a2e';
        let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">`;
        s += `<rect width="200" height="200" rx="16" fill="${bg}"/>`;
        s += `<path d="M60 40 Q100 20 140 40 L150 140 Q100 170 50 140 Z" fill="${sk}" opacity="0.85"/>`;
        s += `<path d="M40 60 Q20 20 100 10 Q180 20 160 60 Q180 100 150 140 Q100 130 50 140 Q20 100 40 60" fill="${hr}"/>`;
        const ey = 85;
        s += `<line x1="75" y1="${ey}" x2="95" y2="${ey}" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>`;
        s += `<line x1="105" y1="${ey}" x2="125" y2="${ey}" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>`;
        if (f.hasMustache) s += `<path d="M80 115 Q100 110 120 115" stroke="${hrD}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        const my = 130;
        if (f.expression === 'happy') s += `<path d="M85 ${my} Q100 ${my+15} 115 ${my}" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>`;
        else s += `<line x1="90" y1="${my}" x2="110" y2="${my}" stroke="white" stroke-width="1" opacity="0.3"/>`;
        s += `</svg>`;
        return s;
    }

    /* ── Avatar: Minimal ── */
    function generateMinimalAvatar(f) {
        const sk = f.skinHex, hr = f.hairHex;
        const bg = pickBg(sk + 'mini'), cl = pickCloth(hr + sk + 'mini');
        const fem = f.gender === 'female' && f.genderProb > 0.55;
        let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">`;
        s += `<rect width="200" height="200" rx="100" fill="${bg}"/>`;
        s += `<ellipse cx="100" cy="192" rx="40" ry="22" fill="${cl}"/>`;
        s += `<rect x="92" y="144" width="16" height="14" rx="4" fill="${sk}"/>`;
        s += `<circle cx="100" cy="88" r="52" fill="${hr}"/>`;
        if (fem) s += `<rect x="50" y="88" width="14" height="42" rx="7" fill="${hr}"/><rect x="136" y="88" width="14" height="42" rx="7" fill="${hr}"/>`;
        s += `<circle cx="100" cy="100" r="44" fill="${sk}"/>`;
        s += `<path d="M58 95 Q58 52 100 45 Q142 52 142 95 Q138 65 100 58 Q62 65 58 95Z" fill="${hr}"/>`;
        s += `<circle cx="85" cy="95" r="3" fill="#333"/><circle cx="115" cy="95" r="3" fill="#333"/>`;
        s += renderGlasses(f, 85, 115, 95, 'minimal');
        if (f.expression === 'happy') s += `<path d="M88 114 Q100 124 112 114" stroke="#333" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
        else s += `<line x1="90" y1="115" x2="110" y2="115" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>`;
        s += `</svg>`;
        return s;
    }

    /* ── Avatar: Geometric ── */
    function generateGeoAvatar(f) {
        const sk = f.skinHex, hr = f.hairHex, hrD = brighten(hr, 0.65);
        const bg = pickBg(sk + 'geo'), cl = pickCloth(hr + sk + 'geo');
        let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">`;
        s += `<rect width="200" height="200" rx="16" fill="${bg}"/>`;
        s += `<rect x="55" y="162" width="90" height="38" rx="18" fill="${cl}"/>`;
        s += `<rect x="90" y="148" width="20" height="18" rx="3" fill="${sk}"/>`;
        s += `<rect x="42" y="38" width="116" height="80" rx="28" fill="${hr}"/>`;
        s += `<rect x="48" y="48" width="104" height="110" rx="26" fill="${sk}"/>`;
        s += `<rect x="48" y="38" width="104" height="35" rx="20" fill="${hr}"/>`;
        s += `<rect x="72" y="87" width="16" height="14" rx="4" fill="white" stroke="#333" stroke-width="1"/><circle cx="80" cy="94" r="3.5" fill="#333"/>`;
        s += `<rect x="112" y="87" width="16" height="14" rx="4" fill="white" stroke="#333" stroke-width="1"/><circle cx="120" cy="94" r="3.5" fill="#333"/>`;
        s += renderGlasses(f, 80, 120, 94, 'geo');
        if (f.expression === 'happy') s += `<path d="M85 126 Q100 138 115 126" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>`;
        else s += `<rect x="88" y="128" width="24" height="4" rx="2" fill="#333" opacity="0.55"/>`;
        s += `</svg>`;
        return s;
    }

    /* ── Display Results ── */
    function showResults(photoUrl, features, avatars) {
        const preview = document.getElementById('photo-preview');
        preview.innerHTML = `<img src="${photoUrl}" alt="Dein Foto"/>`;
        const fl = document.getElementById('features-list');
        fl.innerHTML = `
            <div class="feature-item"><span class="label">Alter</span><span class="value">~${features.age} Jahre</span></div>
            <div class="feature-item"><span class="label">Geschlecht</span><span class="value">${features.gender === 'male' ? 'M\u00e4nnlich' : 'Weiblich'}</span></div>
            <div class="feature-item"><span class="label">Ausdruck</span><span class="value">${features.refinedExpression}</span></div>
            <div class="feature-item"><span class="label">Hautton</span><span class="value"><span class="color-dot" style="background:${features.skinHex}"></span>${features.skinHex}</span></div>
            <div class="feature-item"><span class="label">Haarfarbe</span><span class="value"><span class="color-dot" style="background:${features.hairHex}"></span>${features.hairHex}</span></div>
            <div class="feature-item"><span class="label">Brille</span><span class="value">${features.glasses.hasGlasses ? 'Ja ('+features.glasses.shape+')' : 'Nein'}</span></div>
            <div class="feature-item"><span class="label">Schnurrbart</span><span class="value">${features.hasMustache ? 'Ja' : 'Nein'}</span></div>
            <div class="feature-item"><span class="label">Ohrringe</span><span class="value">${features.hasEarrings ? 'Ja' : 'Nein'}</span></div>
            <div class="feature-item"><span class="label">Nase</span><span class="value">${features.noseShape}</span></div>
            <div class="feature-item"><span class="label">Z\u00e4hne</span><span class="value">${features.showsTeeth ? 'Sichtbar' : 'Nicht sichtbar'}</span></div>
        `;
        const grid = document.getElementById('avatar-grid');
        grid.innerHTML = '';
        avatars.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = 'avatar-card';
            card.innerHTML = `${a.svg}<div class="style-name">${a.name}</div><button class="dl-btn" onclick="event.stopPropagation(); downloadSvg(this, '${a.name}')">Herunterladen</button>`;
            card.addEventListener('click', () => {
                grid.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
            grid.appendChild(card);
        });
        document.getElementById('results').style.display = 'block';
    }
    function downloadSvg(btn, name) {
        const svg = btn.closest('.avatar-card').querySelector('svg').outerHTML;
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `avatar-${name.toLowerCase()}.svg`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ── UI Helpers ── */
    function setStatus(text, loading, cls) {
        const el = document.getElementById('status');
        el.className = cls || '';
        el.innerHTML = (loading ? '<div class="spinner"></div>' : '') + `<span>${text}</span>`;
    }

    /* ── Events ── */
    document.getElementById('capture-btn').addEventListener('click', capture);
    document.getElementById('retry-btn').addEventListener('click', retry);
    </script>
</body>
</html>
