<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam2Avatar</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.25rem; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
        #camera-section {
            position: relative;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            aspect-ratio: 4/3;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        #snapshot-canvas { display: none; }
        #controls { margin-top: 1.5rem; display: flex; gap: 1rem; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #capture-btn { background: #6c5ce7; color: white; }
        #capture-btn:hover:not(:disabled) { background: #5a4bd1; transform: scale(1.03); }
        #retry-btn { background: #2d3436; color: #dfe6e9; }
        #retry-btn:hover { background: #3d4446; }
        #status {
            margin-top: 1.25rem;
            padding: 0.6rem 1.2rem;
            background: #161625;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #a0a0c0;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #status.error { color: #e74c3c; background: #1a0a0a; }
        #status.success { color: #2ecc71; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #444;
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #results {
            display: none;
            width: 100%;
            max-width: 720px;
            margin-top: 2rem;
        }
        #features-panel {
            background: #161625;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        #features-panel h3 { margin-bottom: 0.75rem; font-size: 1rem; color: #b0b0d0; }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }
        .feature-item {
            background: #1e1e35;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .feature-item .label { color: #777; font-size: 0.75rem; display: block; }
        .feature-item .value { color: #e0e0e0; font-weight: 500; }
        .color-dot {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            border: 1px solid #444;
        }
        #avatars-panel h3 {
            font-size: 1rem;
            color: #b0b0d0;
            margin-bottom: 1rem;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .avatar-card {
            background: #161625;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .avatar-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
        .avatar-card.selected { border-color: #6c5ce7; background: #1e1e35; }
        .avatar-card svg { width: 100%; height: auto; border-radius: 8px; }
        .avatar-card .style-name {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #888;
        }
        .avatar-card .dl-btn {
            margin-top: 0.5rem;
            padding: 0.35rem 0.7rem;
            font-size: 0.75rem;
            background: #6c5ce7;
            color: white;
            border-radius: 6px;
            display: none;
        }
        .avatar-card.selected .dl-btn { display: inline-block; }
        .avatar-card .dl-btn:hover { background: #5a4bd1; }
        #photo-preview {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        #photo-preview img {
            max-width: 200px;
            border-radius: 12px;
            transform: scaleX(-1);
            border: 2px solid #2d2d4a;
        }

        /* Debug Logger Styles */
        #debug-log {
            width: 100%;
            max-width: 720px;
            background: #101020;
            padding: 10px;
            border-radius: 8px;
            margin-top: 2rem;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 4px; padding: 2px 4px; border-radius: 4px; border-left: 3px solid #6c5ce7; }
        .log-entry.error { border-left-color: #e74c3c; background: #2a0a0a; }
        .log-entry.info { border-left-color: #2ecc71; }

        @media (max-width: 600px) {
            .avatar-grid { grid-template-columns: 1fr 1fr; }
            .features-grid { grid-template-columns: 1fr 1fr; }
            body { padding: 1rem 0.75rem; }
        }
    </style>
</head>
<body>
    <h1>Webcam2Avatar</h1>
    <p class="subtitle">Foto machen &rarr; Gesicht analysieren &rarr; Avatar generieren</p>

    <!-- Hidden SVG Filters for the "Comic" style -->
    <svg style="display:none">
        <defs>
            <filter id="comic-filter">
                <feColorMatrix type="saturate" values="1.5"/>
                <feComponentTransfer>
                    <feFuncR type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1"/>
                    <feFuncG type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1"/>
                    <feFuncB type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1"/>
                </feComponentTransfer>
                <feMorphology operator="dilate" radius="1" result="dilated"/>
                <feEdgeDetection input="dilated" result="edges"/>
                <feComposite in="SourceGraphic" in2="edges" operator="out"/>
            </filter>
        </defs>
    </svg>

    <div id="camera-section">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="snapshot-canvas"></canvas>

    <div id="controls">
        <button id="capture-btn" disabled>Foto aufnehmen</button>
        <button id="retry-btn" style="display:none">Neues Foto</button>
    </div>

    <div id="status"><div class="spinner"></div><span>Initialisiere...</span></div>

    <div id="results">
        <div id="photo-preview"></div>
        <div id="features-panel">
            <h3>Erkannte Merkmale</h3>
            <div id="features-list" class="features-grid"></div>
        </div>
        <div id="avatars-panel">
            <h3>Deine Avatar-Vorschl&auml;ge</h3>
            <div id="avatar-grid" class="avatar-grid"></div>
        </div>
    </div>

    <div id="debug-log"></div>

    <script>
    // --- Mobile Debug Logger ---
    const debugLog = document.getElementById('debug-log');
    function logToScreen(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = 'log-entry ' + type;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugLog.prepend(div);
        if (debugLog.childNodes.length > 20) debugLog.removeChild(debugLog.lastChild);
    }
    window.onerror = (msg, url, line) => logToScreen(`ERR: ${msg} (${line})`, 'error');
    const _oldError = console.error;
    console.error = function(...args) {
        logToScreen(args.join(' '), 'error');
        _oldError.apply(console, args);
    };
    const _oldLog = console.log;
    console.log = function(...args) {
        logToScreen(args.join(' '), 'info');
        _oldLog.apply(console, args);
    };

    document.addEventListener('DOMContentLoaded', () => { init(); });

    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    let videoStream = null;

    /* ── Init ── */
    async function init() {
        try {
            setStatus('Lade Gesichtserkennungs-Modelle... (1/4)', true);
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (2/4)', true);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (3/4)', true);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
            setStatus('Lade Modelle... (4/4)', true);
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            setStatus('Starte Kamera...', true);
            await startCamera();
            setStatus('Bereit! Klicke auf "Foto aufnehmen".', false, 'success');
            document.getElementById('capture-btn').disabled = false;
        } catch (e) {
            setStatus('Fehler: ' + e.message, false, 'error');
        }
    }

    /* ── Camera ── */
    async function startCamera() {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        const video = document.getElementById('video');
        video.srcObject = videoStream;
        video.style.display = 'block';
        await new Promise(r => { video.onloadeddata = r; });
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
    }

    /* ── Capture & Analyze ── */
    async function capture() {
        try {
            const video = document.getElementById('video');
            const canvas = document.getElementById('snapshot-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            stopCamera();
            video.style.display = 'none';
            document.getElementById('capture-btn').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'inline-block';

            setStatus('Foto aufgenommen! Starte Gesichtsanalyse...', true);
            logToScreen('Analysiere Gesicht (TinyFaceDetector)...', 'info');

            const detection = await faceapi
                .detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.3 })) // Further reduced for iPhone speed
                .withFaceLandmarks()
                .withFaceExpressions()
                .withAgeAndGender();

            if (!detection) {
                setStatus('Kein Gesicht erkannt. Bitte versuche es erneut.', false, 'error');
                logToScreen('Kein Gesicht erkannt. Licht okay?', 'error');
                return;
            }

            setStatus('Gesicht erkannt! Analysiere Details...', true);
            logToScreen('Gesicht gefunden. Extrahiere Merkmale...', 'info');
            
            // Optimization: Get ALL image data at once to avoid repeated slow GPU-CPU syncs
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const features = extractFeatures(detection, imgData);
            features.landmarks = detection.landmarks; // Pass landmarks for geometric avatars
            
            logToScreen(`Extraktion fertig. Expression: ${features.refinedExpression}`, 'info');

            const photoData = canvas.toDataURL('image/jpeg', 0.8);
            const avatars = [
                { name: 'WhatsApp Style', svg: generateWhatsappAvatar(features) },
                { name: 'DNA Vector', svg: generateDnaAvatar(features) },
                { name: 'Comic Photo', svg: generateComicAvatar(photoData) },
                { name: 'Cartoon', svg: generateCartoonAvatar(features) },
                { name: 'Artistic', svg: generateArtisticAvatar(features) },
                { name: 'Minimal', svg: generateMinimalAvatar(features) },
                { name: 'Geometric', svg: generateGeoAvatar(features) },
            ];
            
            setStatus('Generiere Avatare...', true);
            await new Promise(r => setTimeout(r, 50));
            showResults(photoData, features, avatars);
            setStatus('Fertig!', false, 'success');
            logToScreen('Alles erledigt!', 'success');
        } catch (err) {
            console.error(err);
            setStatus('Fehler: ' + err.message, false, 'error');
            logToScreen('FATAL ERR: ' + err.message, 'error');
        }
    }

    async function retry() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('video').style.display = 'block';
        document.getElementById('capture-btn').style.display = 'inline-block';
        document.getElementById('capture-btn').disabled = true;
        document.getElementById('retry-btn').style.display = 'none';
        setStatus('Starte Kamera...', true);
        await startCamera();
        setStatus('Bereit!', false, 'success');
        document.getElementById('capture-btn').disabled = false;
    }

    /* ── Optimized Pixel Sampling Helpers ── */
    function getPixel(imgData, x, y) {
        // Safety check for NaN or undefined coordinates
        if (isNaN(x) || isNaN(y)) return { r: 128, g: 128, b: 128 };
        
        const ix = Math.max(0, Math.min(Math.round(x), imgData.width - 1));
        const iy = Math.max(0, Math.min(Math.round(y), imgData.height - 1));
        const i = (iy * imgData.width + ix) * 4;
        
        // Final safety check for index
        if (isNaN(i) || i < 0 || i >= imgData.data.length) return { r: 128, g: 128, b: 128 };
        
        return { r: imgData.data[i], g: imgData.data[i+1], b: imgData.data[i+2] };
    }

    function sampleGrid(imgData, cx, cy, radius) {
        const colors = [];
        if (isNaN(cx) || isNaN(cy)) return colors;
        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                colors.push(getPixel(imgData, cx + dx, cy + dy));
            }
        }
        return colors;
    }

    function avgOfColors(colors) {
        if (!colors || !colors.length) return { r: 180, g: 150, b: 130 };
        let r = 0, g = 0, b = 0;
        for (const c of colors) { r += (c.r||0); g += (c.g||0); b += (c.b||0); }
        const n = colors.length;
        return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) };
    }

    function medianColor(colors) {
        if (!colors || !colors.length) return { r: 180, g: 150, b: 130 };
        const sorted = [...colors].sort((a, b) => ((a.r + a.g + a.b) || 0) - ((b.r + b.g + b.b) || 0));
        return sorted[Math.floor(sorted.length / 2)];
    }

    function brightnessOf(c) { return ((c.r||0) + (c.g||0) + (c.b||0)) / 3; }

    function avgBrightnessOfPts(imgData, pts) {
        if (!pts || !pts.length) return 128;
        let total = 0;
        let count = 0;
        for (const p of pts) {
            if (!p || isNaN(p.x) || isNaN(p.y)) continue;
            const c = getPixel(imgData, p.x, p.y);
            total += (c.r + c.g + c.b) / 3;
            count++;
        }
        return count > 0 ? total / count : 128;
    }

    function avgColorOfPts(imgData, pts) {
        if (!pts || !pts.length) return { r: 60, g: 60, b: 60 };
        let r = 0, g = 0, b = 0;
        let count = 0;
        for (const p of pts) {
            if (!p || isNaN(p.x) || isNaN(p.y)) continue;
            const c = getPixel(imgData, p.x, p.y);
            r += c.r; g += c.g; b += c.b;
            count++;
        }
        return count > 0 ? { r: Math.round(r / count), g: Math.round(g / count), b: Math.round(b / count) } : { r: 60, g: 60, b: 60 };
    }

    function clampBrightness(c, lo, hi) {
        const br = brightnessOf(c);
        if (br < lo) { const f = lo / Math.max(br, 1); return mapC(c, f); }
        if (br > hi) { const f = hi / br; return mapC(c, f); }
        return c;
    }
    function mapC(c, f) {
        return { r: Math.min(255, Math.round(c.r * f)), g: Math.min(255, Math.round(c.g * f)), b: Math.min(255, Math.round(c.b * f)) };
    }

    /* ── Color Helpers ── */
    function rgbHex(c) { return '#' + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, '0')).join(''); }
    function brighten(hex, f) {
        const c = hexRgb(hex);
        return rgbHex({ r: Math.min(255, Math.round(c.r * f)), g: Math.min(255, Math.round(c.g * f)), b: Math.min(255, Math.round(c.b * f)) });
    }
    function hexRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
    function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h; }

    const BG_COLORS = ['#dfe6e9','#dff9fb','#ffeaa7','#fab1a0','#a29bfe','#55efc4','#74b9ff','#fd79a8','#f5f6fa'];
    const CLOTH_COLORS = ['#3498db','#2ecc71','#e74c3c','#9b59b6','#f39c12','#1abc9c','#34495e','#e67e22'];

    function pickBg(seed) { return BG_COLORS[Math.abs(hashStr(seed)) % BG_COLORS.length]; }
    function pickCloth(seed) { return CLOTH_COLORS[Math.abs(hashStr(seed)) % CLOTH_COLORS.length]; }

    /* ── Feature Extraction (refined) ── */
    function extractFeatures(det, imgData) {
        try {
            const lm = det.landmarks;
            const age = Math.round(det.age);
            const gender = det.gender;
            const genderProb = det.genderProbability;

            const exprs = det.expressions;
            const sortedExprs = Object.entries(exprs).sort((a, b) => b[1] - a[1]);
            const expression = sortedExprs[0][0];
            const expressionScore = sortedExprs[0][1];

            const jaw = lm.getJawOutline();
            const nose = lm.getNose();
            const mouth = lm.getMouth();
            const leftBrow = lm.getLeftEyeBrow();
            const rightBrow = lm.getRightEyeBrow();
            const leftEye = lm.getLeftEye();
            const rightEye = lm.getRightEye();

            // ── Skin color ──
            const skinSamples = [];
            const foreheadX = (leftBrow[2].x + rightBrow[2].x) / 2;
            const foreheadY = (leftBrow[2].y + rightBrow[2].y) / 2;
            skinSamples.push(...sampleGrid(imgData, foreheadX, foreheadY, 3));
            skinSamples.push(...sampleGrid(imgData, nose[0].x - 8, nose[0].y, 2));
            skinSamples.push(...sampleGrid(imgData, nose[0].x + 8, nose[0].y, 2));

            for (const eyeSet of [leftEye, rightEye]) {
                const cx = (eyeSet[0].x + eyeSet[3].x) / 2;
                const cheekX = cx + (nose[0].x - cx) * 0.4;
                const cheekY = eyeSet[4].y + 10;
                skinSamples.push(...sampleGrid(imgData, cheekX, cheekY, 3));
            }

            let skinColor = medianColor(skinSamples);
            skinColor = mapC(skinColor, 1.15);
            skinColor = clampBrightness(skinColor, 95, 245);
            const skinBr = brightnessOf(skinColor);

            // ── Hair color ──
            const allHairSamples = [];
            const brows = [...leftBrow, ...rightBrow];
            const faceH = jaw[8].y - Math.min(...brows.map(p => p.y));
            const hairOffset = Math.max(35, faceH * 0.65);

            for (const offsetMul of [0.8, 1.0, 1.2]) {
                const off = hairOffset * offsetMul;
                for (const p of brows) {
                    const y = p.y - off;
                    if (y > 2) allHairSamples.push(...sampleGrid(imgData, p.x, y, 2));
                }
            }

            let hairColor = allHairSamples.length > 0 ? medianColor(allHairSamples) : { r: 60, g: 40, b: 30 };
            if (Math.abs(hairColor.r - skinColor.r) + Math.abs(hairColor.g - skinColor.g) + Math.abs(hairColor.b - skinColor.b) < 50) {
                hairColor = mapC(hairColor, 0.55);
            }
            hairColor = clampBrightness(hairColor, 15, 210);

            // ── Refined Expression & Mood ──
            let refinedExpression = 'Normal';
            let mood = 'neutral';
            if (expression === 'happy') {
                refinedExpression = expressionScore > 0.85 ? 'Überglücklich' : 'Lachend';
                mood = 'happy';
            } else if (expression === 'sad') {
                refinedExpression = expressionScore > 0.7 ? 'Voll traurig' : 'Traurig';
                mood = 'sad';
            } else if (expression === 'angry') {
                refinedExpression = 'Wütend';
                mood = 'angry';
            } else if (expression === 'surprised') {
                refinedExpression = 'Überrascht';
                mood = 'surprised';
            } else if (expression === 'neutral') {
                refinedExpression = 'Neutral';
                mood = 'neutral';
            }

            // ── Eyebrow Analysis ──
            const getBrowHeight = (brow, eye) => {
                const bY = brow.reduce((sum, p) => sum + p.y, 0) / brow.length;
                const eY = eye.reduce((sum, p) => sum + p.y, 0) / eye.length;
                return eY - bY;
            };
            const leftBrowH = getBrowHeight(leftBrow, leftEye);
            const rightBrowH = getBrowHeight(rightBrow, rightEye);
            const avgBrowH = (leftBrowH + rightBrowH) / 2;
            
            // Typical brow height is around 20-30px in a 160px crop
            let browStyle = 'normal';
            if (avgBrowH > 28) browStyle = 'hoch';
            else if (avgBrowH < 18) browStyle = 'tief/konzentriert';

            // ── Teeth Detection ──
            let showsTeeth = false;
            if (expression === 'happy') {
                const innerMouthPts = [];
                const mCenter = { x: (mouth[12].x + mouth[16].x) / 2, y: (mouth[12].y + mouth[16].y) / 2 };
                innerMouthPts.push(...sampleGrid(imgData, mCenter.x, mCenter.y, 2));
                showsTeeth = avgBrightnessOfPts(imgData, innerMouthPts) > skinBr * 0.8 || avgBrightnessOfPts(imgData, innerMouthPts) > 160;
            }

            // ── Nose Shape ──
            const noseWidth = Math.abs(nose[4].x - nose[0].x);
            const noseHeight = Math.abs(nose[3].y - nose[0].y);
            const noseShape = (noseWidth / (noseHeight || 1)) > 1.3 ? 'breit' : 'schmal/kurz';

            // ── Earring Detection ──
            let hasEarrings = false;
            const lobePoints = [jaw[0], jaw[1], jaw[15], jaw[16]];
            for (const p of lobePoints) {
                const side = p.x < (jaw[8].x) ? -1 : 1;
                const earringZone = sampleGrid(imgData, p.x + (side * 6), p.y + 2, 4);
                const avgE = avgBrightnessOfPts(imgData, earringZone);
                if (Math.abs(avgE - skinBr) > 45 || avgE > 220) {
                    hasEarrings = true;
                    break;
                }
            }

            // ── Glasses detection ──
            const glasses = detectGlasses(imgData, lm, skinBr);

            return {
                age, gender, genderProb, expression, refinedExpression, mood,
                skinColor, hairColor,
                skinHex: rgbHex(skinColor),
                hairHex: rgbHex(hairColor),
                glasses, showsTeeth, noseShape, hasEarrings, browStyle
            };
        } catch (e) {
            logToScreen('ERR in extractFeatures: ' + e.message, 'error');
            throw e;
        }
    }

    /* ── Glasses Detection ── */
    function detectGlasses(imgData, landmarks, skinBr) {
        const le = landmarks.getLeftEye(), re = landmarks.getRightEye();
        const lb = landmarks.getLeftEyeBrow(), rb = landmarks.getRightEyeBrow();
        function box(pts) {
            let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
            for (const p of pts) { x1 = Math.min(x1, p.x); y1 = Math.min(y1, p.y); x2 = Math.max(x2, p.x); y2 = Math.max(y2, p.y); }
            return { x1, y1, x2, y2, cx: (x1+x2)/2, cy: (y1+y2)/2, w: x2-x1, h: y2-y1 };
        }
        const lBox = box(le), rBox = box(re), lbBox = box(lb), rbBox = box(rb);
        const topPts = [];
        for (const [eB, bB] of [[lBox, lbBox], [rBox, rbBox]]) {
            const y = (bB.y2 + eB.y1) / 2;
            for (let x = eB.x1 - 4; x <= eB.x2 + 4; x += 2) topPts.push({ x, y }, { x, y: y + 2 });
        }
        const bridgePts = [];
        const lInner = le[3], rInner = re[0];
        for (let t = 0.1; t <= 0.9; t += 0.1) bridgePts.push({ x: lInner.x + (rInner.x - lInner.x) * t, y: lInner.y + (rInner.y - lInner.y) * t - 2 });
        
        const topRatio = avgBrightnessOfPts(imgData, topPts) / Math.max(skinBr, 1);
        const bridgeRatio = avgBrightnessOfPts(imgData, bridgePts) / Math.max(skinBr, 1);
        const hasGlasses = (topRatio < 0.72 || bridgeRatio < 0.72);

        if (!hasGlasses) return { hasGlasses: false, shape: null, colorHex: null };

        const glassW = (lBox.w + rBox.w) / 2 + 10, glassH = (lBox.h + rBox.h) / 2 + 10;
        const ar = glassW / Math.max(glassH, 1);
        const shape = ar > 1.6 ? 'eckig' : ar < 1.2 ? 'rund' : 'oval';
        const frameColor = avgColorOfPts(imgData, bridgePts);
        return { hasGlasses: true, shape, color: frameColor, colorHex: rgbHex(frameColor) };
    }

    /* ── Glasses SVG Renderer ── */
    function renderGlasses(f, lx, rx, ey, style) {
        if (!f.glasses || !f.glasses.hasGlasses) return '';
        const gc = f.glasses.colorHex || '#333';
        const shape = f.glasses.shape || 'oval';
        const sw = 2.2, midX = (lx + rx) / 2;
        let s = '';
        const tint = `fill="${gc}" fill-opacity="0.08"`;
        if (shape === 'rund') {
            s += `<circle cx="${lx}" cy="${ey}" r="13" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<circle cx="${rx}" cy="${ey}" r="13" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        } else if (shape === 'eckig') {
            s += `<rect x="${lx-14}" y="${ey-9}" width="28" height="18" rx="2" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<rect x="${rx-14}" y="${ey-9}" width="28" height="18" rx="2" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        } else {
            s += `<ellipse cx="${lx}" cy="${ey}" rx="15" ry="11" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
            s += `<ellipse cx="${rx}" cy="${ey}" rx="15" ry="11" ${tint} stroke="${gc}" stroke-width="${sw}"/>`;
        }
        s += `<path d="M${lx+13} ${ey-1} Q${midX} ${ey-4} ${rx-13} ${ey-1}" stroke="${gc}" stroke-width="${sw*0.8}" fill="none"/>`;
        return s;
    }

    /* ── Avatar: DNA Vector (Bespoke Geometry) ── */
    function generateDnaAvatar(f) {
        if (!f.landmarks) return generateMinimalAvatar(f);
        
        const lm = f.landmarks;
        const imgW = f.landmarks.imageWidth;
        const imgH = f.landmarks.imageHeight;
        
        // Helper to map image coords to 200x200 SVG space
        const box = lm.align(); // aligned box
        const shiftX = box.x, shiftY = box.y, scale = 180 / Math.max(box.width, box.height);
        
        const pts = (points) => points.map(p => `${(p.x - shiftX) * scale + 10},${(p.y - shiftY) * scale + 10}`).join(' ');
        
        const jaw = lm.getJawOutline();
        const lEye = lm.getLeftEye();
        const rEye = lm.getRightEye();
        const mouth = lm.getMouth();
        const nose = lm.getNose();
        const lBrow = lm.getLeftEyeBrow();
        const rBrow = lm.getRightEyeBrow();

        const sk = f.skinHex, hr = f.hairHex;
        const bg = pickBg(sk + 'dna');

        let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">`;
        s += `<rect width="200" height="200" rx="16" fill="${bg}"/>`;
        
        // Bespoke Jawline shape
        s += `<polygon points="${pts(jaw)}" fill="${sk}" stroke="${brighten(sk, 0.8)}" stroke-width="1"/>`;
        
        // Hair abstraction (connected to brows/top of jaw)
        const hairPts = [jaw[16], {x: jaw[16].x, y: jaw[16].y - 40}, {x: jaw[0].x, y: jaw[0].y - 40}, jaw[0]];
        s += `<path d="M${pts([jaw[0]])} Q100,-20 ${pts([jaw[16]])} L${pts([jaw[16]])} Q100,20 ${pts([jaw[0]])} Z" fill="${hr}" opacity="0.8"/>`;

        // Features as abstract geometric shapes but at REAL positions
        s += `<polyline points="${pts(lBrow)}" fill="none" stroke="${hr}" stroke-width="3" stroke-linecap="round" opacity="0.6"/>`;
        s += `<polyline points="${pts(rBrow)}" fill="none" stroke="${hr}" stroke-width="3" stroke-linecap="round" opacity="0.6"/>`;
        
        // Eyes
        s += `<polygon points="${pts(lEye)}" fill="white" stroke="#333" stroke-width="0.5"/>`;
        s += `<polygon points="${pts(rEye)}" fill="white" stroke="#333" stroke-width="0.5"/>`;
        
        // Pupils at center of eye polygons
        const getCenter = (pSet) => ({ x: pSet.reduce((a,b)=>a+b.x,0)/pSet.length, y: pSet.reduce((a,b)=>a+b.y,0)/pSet.length });
        const lc = getCenter(lEye), rc = getCenter(rEye);
        s += `<circle cx="${(lc.x - shiftX) * scale + 10}" cy="${(lc.y - shiftY) * scale + 10}" r="2.5" fill="#333"/>`;
        s += `<circle cx="${(rc.x - shiftX) * scale + 10}" cy="${(rc.y - shiftY) * scale + 10}" r="2.5" fill="#333"/>`;

        // Glasses if detected
        if (f.glasses.hasGlasses) {
            const gc = f.glasses.colorHex;
            s += `<circle cx="${(lc.x - shiftX) * scale + 10}" cy="${(lc.y - shiftY) * scale + 10}" r="14" fill="none" stroke="${gc}" stroke-width="2" opacity="0.7"/>`;
            s += `<circle cx="${(rc.x - shiftX) * scale + 10}" cy="${(rc.y - shiftY) * scale + 10}" r="14" fill="none" stroke="${gc}" stroke-width="2" opacity="0.7"/>`;
        }

        // Nose
        s += `<polyline points="${pts(nose)}" fill="none" stroke="${brighten(sk, 0.7)}" stroke-width="1.5" opacity="0.5"/>`;
        
        // Mouth
        s += `<polygon points="${pts(mouth)}" fill="${f.expression==='happy'?'#e74c3c':'#333'}" opacity="0.4" stroke="#333" stroke-width="0.5"/>`;
        
        // Earring hint
        if (f.hasEarrings) {
            s += `<circle cx="${(jaw[0].x - shiftX) * scale + 8}" cy="${(jaw[0].y - shiftY) * scale + 12}" r="3" fill="gold"/>`;
            s += `<circle cx="${(jaw[16].x - shiftX) * scale + 12}" cy="${(jaw[16].y - shiftY) * scale + 12}" r="3" fill="gold"/>`;
        }

        s += `</svg>`;
        return s;
    }

            card.addEventListener('click', () => {
                grid.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
            grid.appendChild(card);
        });
        document.getElementById('results').style.display = 'block';
    }
    function downloadSvg(btn, name) {
        const svg = btn.closest('.avatar-card').querySelector('svg').outerHTML;
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `avatar-${name.toLowerCase()}.svg`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ── UI Helpers ── */
    function setStatus(text, loading, cls) {
        const el = document.getElementById('status');
        el.className = cls || '';
        el.innerHTML = (loading ? '<div class="spinner"></div>' : '') + `<span>${text}</span>`;
    }

    /* ── Events ── */
    document.getElementById('capture-btn').addEventListener('click', capture);
    document.getElementById('retry-btn').addEventListener('click', retry);
    </script>
</body>
</html>
